<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Protocol | White Hacker Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #10b981; font-family: 'Courier New', Courier, monospace; }
        .glitch { text-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        input { background: transparent; border-bottom: 2px solid #10b981; outline: none; color: white; text-align: center; font-size: 1.5rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-2xl w-full border border-emerald-500/30 p-10 rounded-lg bg-black/50 backdrop-blur-md shadow-[0_0_50px_rgba(16,185,129,0.1)]">
        <h1 class="text-3xl font-bold mb-6 glitch tracking-tighter text-center">TIZIMGA KIRISH: PROTOKOL 404</h1>
        
        <p class="text-emerald-500/80 mb-8 text-sm leading-relaxed text-center">
            "Haqiqiy bilim ko'rinadigan joyda emas, qidirilgan joyda bo'ladi. 
            Ushbu tizimning kalitini topgan kishi, mehnati uchun munosib taqdirlanadi. 
            Eslab qol: Har bir bitda ma'no bor."
        </p>

        <div class="space-y-6 flex flex-col items-center">
            <input type="password" id="accessKey" placeholder="KALITNI KIRITING" class="w-full max-w-xs py-2">
            
            <button onclick="verifyAccess()" class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-black font-bold rounded transition-all active:scale-95">
                TERMINALNI OCHISH
            </button>
        </div>

        <div id="result" class="mt-10 text-center hidden">
            <div class="p-4 border border-yellow-500/50 bg-yellow-500/10 text-yellow-500 rounded">
                <p class="font-bold">MUKOFOT KODI: <span id="rewardCode" class="underline"></span></p>
                <p class="mt-2 text-xs text-white/70 italic">Ushbu kodni adminstratorga yuboring va pul mukofotini oling.</p>
            </div>
        </div>
    </div>

    <script>
        // 2-QADAM: Console'ga xabar yuborish (Hackerlar Inspector'ni ochadi)
        console.log("%cTo'xta! %cSiz to'g'ri yo'ldasiz.", "color: red; font-size: 20px; font-weight: bold", "color: green; font-size: 15px;");
        console.log("Jumboqning 2-qismi: Kalit bu - 'White' so'zi va sahifadagi eng kichik raqamning yig'indisi.");

        // 3-QADAM: Murakkab mantiqiy tekshiruv
        function verifyAccess() {
            const input = document.getElementById('accessKey').value;
            const resultDiv = document.getElementById('result');
            const rewardSpan = document.getElementById('rewardCode');

            // Haqiqiy kalit: "White404" (Base64'da yashirilgan yoki console'dagi maslahat orqali)
            // Bu yerda kalitni oddiy ko'rinishda saqlamaymiz (Obfuscation)
            const _0x4f2 = "V2hpdGU0MDQ="; // Bu "White404" ning Base64 ko'rinishi
            
            if (btoa(input) === _0x4f2) {
                resultDiv.classList.remove('hidden');
                rewardSpan.innerText = "HACK-SUCCESS-777-GOLD";
                alert("Tabriklayman, White Hacker! Siz tizimni yora oldingiz.");
            } else {
                alert("KALIT XATO. Qayta urinib ko'ring, agar uddalay olsangiz...");
                console.warn("Urinish muvaffaqiyatsiz. 'Inspector' elementlarini yaxshilab tekshiring.");
            }
        }

        /* YASHIRIN XABAR: 
           Agar siz buni o'qiyotgan bo'lsangiz, demak siz kodingizni yaxshi ko'rasiz.
           Sizga maslahat: Kalit bu - Sarlavhadagi raqamni 'White' so'ziga qo'shilgani.
        */
    </script>
</body>
</html>
